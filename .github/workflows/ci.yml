name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  data-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Fail if metals.js drifted from raw + narratives
        run: npm run check:data
      - name: Production build
        run: npm run build
